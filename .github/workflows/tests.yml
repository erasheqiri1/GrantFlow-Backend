name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.135.3 sqlalchemy==2.0.49 pyjwt==2.12.1 bcrypt==5.0.0 \
            pydantic==2.12.5 pydantic-settings==2.13.1 python-dotenv==1.2.2 \
            psycopg2-binary==2.9.11 redis==7.4.0 celery==5.6.3 \
            openai==2.38.0 pdfplumber==0.11.9 httpx==0.28.1 pytest==9.0.3

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grantflow_test
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/unit/ -v
